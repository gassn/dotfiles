# ====================
# General
# ====================
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -g history-limit 50000
set -g mouse on
set -sg escape-time 0
set -g focus-events on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# ====================
# Prefix
# ====================
unbind C-b
set -g prefix C-t
bind C-t send-prefix

# ====================
# Key Bindings
# ====================

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# Split panes
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window in current path
bind c new-window -c "#{pane_current_path}"

# Pane navigation (vim-style)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resize
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Window navigation
bind -r p previous-window
bind -r n next-window

# ====================
# Copy Mode (vi)
# ====================
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# ====================
# Status Bar
# ====================
set -g status-position bottom
set -g status-interval 5
set -g status-style "bg=colour235,fg=colour248"

set -g status-left-length 30
set -g status-left "#[fg=colour82,bold] #S #[fg=colour248]| "

set -g status-right-length 60
set -g status-right "#[fg=colour248]#H #[fg=colour245]%Y-%m-%d %H:%M"

setw -g window-status-format " #I:#W "
setw -g window-status-current-format "#[fg=colour82,bold] #I:#W "

# Pane borders
set -g pane-border-style "fg=colour238"
set -g pane-active-border-style "fg=colour82"

# ====================
# Messages
# ====================
set -g message-style "bg=colour235,fg=colour82"
set -g display-time 2000

# ====================
# Plugins (TPM)
# ====================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Resurrect settings
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-vim 'session'

# Continuum settings
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Initialize TPM (must be last line)
run '~/.tmux/plugins/tpm/tpm'
